version: '3.9'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:123456@db:5432/template_db?schema=public
      JWT_SECRET: change-me-super-secret-jwt-key-at-least-32-chars
      JWT_REFRESH_SECRET: change-me-super-secret-refresh-key-32-chars
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: template_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d template_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
